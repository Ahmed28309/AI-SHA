slam_toolbox:
  ros__parameters:
    # ROS Parameters
    use_sim_time: false

    # Frames
    odom_frame: odom
    map_frame: map
    base_frame: base_link
    scan_topic: /scan

    # Mode
    mode: mapping  # mapping or localization

    # Transform handling - CRITICAL for static TF
    transform_timeout: 2.0  # Wait longer for transforms
    tf_buffer_duration: 120.0  # Large buffer
    minimum_travel_distance: 0.15  # Move 15cm before updating (tighter for hallways)
    minimum_travel_heading: 0.15  # Rotate ~8.6° before updating
    scan_buffer_size: 5  # Small buffer for sync mode
    scan_buffer_maximum_scan_distance: 12.0
    link_match_minimum_response_fine: 0.1
    link_scan_maximum_distance: 1.5
    loop_search_maximum_distance: 4.0

    # Resolution and range
    # LONG HALLWAY NOTE: School corridors are featureless stretches where
    # the LiDAR sees only two parallel walls.  Higher resolution (0.05 vs
    # 0.1) preserves door frames, lockers, and alcoves that anchor the
    # scan matcher.  Without these features, odometry slip warps the map.
    # Enable encoder odometry (publish_odom: true in mecanum_params.yaml)
    # to supplement rf2o_laser_odometry during these stretches.
    resolution: 0.05  # 5cm cells — captures doorframes and lockers
    max_laser_range: 10.0
    minimum_time_interval: 0.5  # Process scans every 500ms

    # Map updates
    map_update_interval: 3.0  # Slower updates

    # Solver
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: None

    # Scan matching correlation parameters
    # HALLWAY TUNING: Tighter search space (0.3 m vs 0.5 m) reduces false
    # matches in repetitive corridor geometry.  The scanner has fewer
    # unique features to discriminate, so a wider search space is more
    # likely to match the wrong segment of wall.
    correlation_search_space_dimension: 0.3
    correlation_search_space_resolution: 0.01
    correlation_search_space_smear_deviation: 0.1

    # Loop closure
    loop_search_space_dimension: 8.0
    loop_search_space_resolution: 0.05
    loop_search_space_smear_deviation: 0.03

    # Scan matcher
    distance_variance_penalty: 0.5
    angle_variance_penalty: 1.0

    fine_search_angle_offset: 0.00349
    coarse_search_angle_offset: 0.349
    coarse_angle_resolution: 0.0349
    minimum_angle_penalty: 0.9
    minimum_distance_penalty: 0.5
    use_response_expansion: true
